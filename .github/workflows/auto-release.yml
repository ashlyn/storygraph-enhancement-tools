name: Auto-release version

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'docs/CHANGELOG.md'
      - 'static/**'
      - 'src/**'

jobs:
  build-assets:
    name: Build assets
    runs-on: ubuntu-latest
    # Map the step output to a job-level output so other jobs can read it
    outputs:
      release_arg: ${{ steps.detector.outputs.arg }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Fetch history so git diff can check the last commit

      - name: Detect screenshot changes
        id: detector
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "^screenshots/"; then
            echo "arg=upload" >> $GITHUB_OUTPUT
          else
            echo "arg=publish" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
    
      - name: Install dependencies
        run: npm install

      - name: Build
        id: build
        run: npm run build

      - name: Pack directory to zip
        id: pack
        uses: cardinalby/webext-buildtools-pack-extension-dir-action@v1.0.8
        with:
          extensionDir: 'dist/'
          zipFilePath: 'artifacts/dist.zip'

      - name: Upload zipped artifacts
        id: upload-zip-artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-dist-zip
          path: artifacts/dist.zip

  build-signed-crx:
    needs: build-assets
    name: Build signed CRX
    runs-on: ubuntu-latest
    steps:
      - name: Download zipped artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifact-dist-zip
          path: artifacts

      - name: Build offline crx
        id: build-crx
        continue-on-error: true
        uses: cardinalby/webext-buildtools-chrome-crx-action@v2.0.3
        with:
          zipFilePath: artifacts/dist.zip
          crxFilePath: artifacts/storygraph-enhancement-tools.crx
          privateKey: ${{ secrets.CHROME_CRX_PRIVATE_KEY }}

      - name: Upload CRX artifact
        id: upload-crx-artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: artifact-crx
          path: artifacts/storygraph-enhancement-tools.crx

      - name: Upload CRX to Chrome Webstore
        continue-on-error: true
        # Now safely reads the output generated in the build-assets job
        run: npx chrome-webstore-upload-cli@4 ${{ needs.build-assets.outputs.release_arg }} --source artifacts/storygraph-enhancement-tools.crx
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_DEV_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_DEV_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_DEV_REFRESH_TOKEN }}
          PUBLISHER_ID: ${{ secrets.CHROME_DEV_PUBLISHER_ID }}

  build-signed-xpi:
    needs: build-assets
    name: Build signed XPI
    runs-on: ubuntu-latest
    steps:
      - name: Download zipped artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifact-dist-zip
          path: artifacts

      - name: Sign Firefox xpi for offline distribution
        id: firefox-sign-xpi
        continue-on-error: true
        uses: cardinalby/webext-buildtools-firefox-sign-xpi-action@v1.0.7
        with:
          timeoutMs: 1200000
          extensionId: ${{ secrets.FIREFOX_OFFLINE_EXTENSION_ID }}
          zipFilePath: artifacts/dist.zip
          xpiFilePath: artifacts/storygraph-enhancement-tools.xpi
          jwtIssuer: ${{ secrets.FIREFOX_JWT_ISSUER }}
          jwtSecret: ${{ secrets.FIREFOX_JWT_SECRET }}

      - name: Submit Firefox add-on
        id: firefox-sign-listed-xpi
        continue-on-error: true
        uses: cardinalby/webext-buildtools-firefox-sign-xpi-action@v1.0.7
        with:
          timeoutMs: 1200000
          channel: listed
          extensionId: ${{ secrets.FIREFOX_OFFLINE_EXTENSION_ID }}
          zipFilePath: artifacts/dist.zip
          xpiFilePath: artifacts/storygraph-enhancement-tools-listed.xpi
          jwtIssuer: ${{ secrets.FIREFOX_JWT_ISSUER }}
          jwtSecret: ${{ secrets.FIREFOX_JWT_SECRET }}

      - name: Upload XPI artifact
        id: upload-xpi-artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: artifact-xpi
          path: artifacts/*.xpi

  create-release:
    needs:
      - build-assets
      - build-signed-crx
      - build-signed-xpi
    name: Create tag and release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from CHANGELOG.md
        id: changelog_reader
        uses: mindsers/changelog-reader-action@v2
        with:
          path: ./docs/CHANGELOG.md

      - name: Push tag with correct version
        id: push_tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: ${{ steps.changelog_reader.outputs.version }}
          release_branches: main

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: artifact-*
          merge-multiple: true

      - name: Create a new release
        uses: softprops/action-gh-release@v2
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.changelog_reader.outputs.version }}
          name: ${{ steps.changelog_reader.outputs.version }}
          body: ${{ steps.changelog_reader.outputs.changes }}
          prerelease: ${{ steps.changelog_reader.outputs.status == 'prereleased' }}
          draft: false
          files: |
            artifacts/*.zip
            artifacts/*.crx
            artifacts/*.xpi
